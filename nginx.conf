worker_processes auto;
worker_rlimit_nofile 8192;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # --- Performance ---
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  # --- Gzip ---
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

  # --- Logging ---
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # --- HTTP → HTTPS redirect ---
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  server {
    # HTTP/1.1 + HTTP/2 over TLS (TCP)
    listen 443 ssl;
    http2 on;

    # HTTP/3 over QUIC (UDP)
    listen 443 quic reuseport;

    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- TLS ---
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Advertise HTTP/3 to clients
    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    # DNS resolver for proxying to external HTTPS domains
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Hashed assets (Vite outputs to /assets/ with content hashes) ---
    location /assets/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      access_log off;
    }

    # --- Static files (favicon, robots.txt, etc.) ---
    location ~* \.(ico|png|jpg|jpeg|gif|webp|svg|woff|woff2|ttf|otf)$ {
      expires 7d;
      add_header Cache-Control "public";
      access_log off;
    }

    # --- API reverse proxy ---
    location /api/ {
      proxy_pass ${API_URL};
      proxy_http_version 1.1;
      proxy_set_header Host "${API_HOST}";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_ssl_server_name on;
      proxy_ssl_name "${API_HOST}";
      proxy_buffering on;
      proxy_buffer_size 8k;
      proxy_buffers 8 8k;
      proxy_connect_timeout 10s;
      proxy_read_timeout 30s;
    }

    # --- OTLP telemetry proxy (strips /otlp prefix) ---
    location /otlp/ {
      proxy_pass ${OTLP_URL};
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_connect_timeout 5s;
      proxy_read_timeout 10s;
    }

    # --- PostHog analytics proxy ---
    # Static assets and SDK config route to assets domain
    location /ingest/static/ {
      proxy_pass https://${POSTHOG_REGION}-assets.i.posthog.com/static/;
      proxy_set_header Host "${POSTHOG_REGION}-assets.i.posthog.com";
      proxy_ssl_server_name on;
      proxy_ssl_name "${POSTHOG_REGION}-assets.i.posthog.com";
    }

    location /ingest/array/ {
      proxy_pass https://${POSTHOG_REGION}-assets.i.posthog.com/array/;
      proxy_set_header Host "${POSTHOG_REGION}-assets.i.posthog.com";
      proxy_ssl_server_name on;
      proxy_ssl_name "${POSTHOG_REGION}-assets.i.posthog.com";
    }

    # Everything else (event capture, flags, API) routes to ingest domain
    location /ingest/ {
      proxy_pass https://${POSTHOG_REGION}.i.posthog.com/;
      proxy_set_header Host "${POSTHOG_REGION}.i.posthog.com";
      proxy_ssl_server_name on;
      proxy_ssl_name "${POSTHOG_REGION}.i.posthog.com";
    }

    # --- SPA fallback (TanStack Router client-side routing) ---
    location / {
      try_files $uri $uri/ /index.html;

      # index.html must never be cached
      location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
      }
    }
  }
}
